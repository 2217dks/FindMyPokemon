<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="stylesheet" href="src/style.css" />
    </head>

    <body>
        <header>
            <div id="navbar-placeholder"></div>
        </header>
        <main>
            <section id="home-section">
                <form id="search-form">
                    <input
                        type="text"
                        id="search-input"
                        placeholder="Search your Pokemon..."
                        required
                    />
                    <button type="submit" class="search-icon">🔍</button>
                </form>
            </section>
            <div class="browser">
                <aside class="browse-section" id="browse-section">
                    <h3 class="filter-heading">Sort by</h3>
                    <select id="sort-select" class="sort-select">
                        <option value="id">ID (Low to High)</option>
                        <option value="hp-high">HP (High to Low)</option>
                        <option value="hp-low">HP (Low to High)</option>
                    </select>

                    <h3 class="filter-heading">Select Generations</h3>
                    <div class="checkbox-group">
                        <label
                            ><input
                                type="checkbox"
                                class="gen-check"
                                value="1"
                                checked
                            />
                            Generation 1</label
                        >
                        <label
                            ><input
                                type="checkbox"
                                class="gen-check"
                                value="2"
                            />
                            Generation 2</label
                        >
                        <label
                            ><input
                                type="checkbox"
                                class="gen-check"
                                value="3"
                            />
                            Generation 3</label
                        >
                        <label
                            ><input
                                type="checkbox"
                                class="gen-check"
                                value="4"
                            />
                            Generation 4</label
                        >
                        <label
                            ><input
                                type="checkbox"
                                class="gen-check"
                                value="5"
                            />
                            Generation 5</label
                        >
                        <label
                            ><input
                                type="checkbox"
                                class="gen-check"
                                value="6"
                            />
                            Generation 6</label
                        >
                        <label
                            ><input
                                type="checkbox"
                                class="gen-check"
                                value="7"
                            />
                            Generation 7</label
                        >
                        <label
                            ><input
                                type="checkbox"
                                class="gen-check"
                                value="8"
                            />
                            Generation 8</label
                        >
                        <label
                            ><input
                                type="checkbox"
                                class="gen-check"
                                value="9"
                            />
                            Generation 9</label
                        >
                    </div>

                    <h3 class="filter-heading">Filter by Type</h3>
                    <div class="checkbox-group">
                        <label class="pill-checkbox">
                            <input
                                type="checkbox"
                                class="type-check"
                                value="normal"
                            />
                            <span class="pill normal">Normal</span>
                        </label>

                        <label class="pill-checkbox">
                            <input
                                type="checkbox"
                                class="type-check"
                                value="fire"
                            />
                            <span class="pill fire">Fire</span>
                        </label>

                        <label class="pill-checkbox">
                            <input
                                type="checkbox"
                                class="type-check"
                                value="water"
                            />
                            <span class="pill water">Water</span>
                        </label>

                        <label class="pill-checkbox">
                            <input
                                type="checkbox"
                                class="type-check"
                                value="electric"
                            />
                            <span class="pill electric">Electric</span>
                        </label>

                        <label class="pill-checkbox">
                            <input
                                type="checkbox"
                                class="type-check"
                                value="grass"
                            />
                            <span class="pill grass">Grass</span>
                        </label>

                        <label class="pill-checkbox">
                            <input
                                type="checkbox"
                                class="type-check"
                                value="ice"
                            />
                            <span class="pill ice">Ice</span>
                        </label>

                        <label class="pill-checkbox">
                            <input
                                type="checkbox"
                                class="type-check"
                                value="fighting"
                            />
                            <span class="pill fighting">Fighting</span>
                        </label>

                        <label class="pill-checkbox">
                            <input
                                type="checkbox"
                                class="type-check"
                                value="poison"
                            />
                            <span class="pill poison">Poison</span>
                        </label>

                        <label class="pill-checkbox">
                            <input
                                type="checkbox"
                                class="type-check"
                                value="ground"
                            />
                            <span class="pill ground">Ground</span>
                        </label>

                        <label class="pill-checkbox">
                            <input
                                type="checkbox"
                                class="type-check"
                                value="flying"
                            />
                            <span class="pill flying">Flying</span>
                        </label>

                        <label class="pill-checkbox">
                            <input
                                type="checkbox"
                                class="type-check"
                                value="psychic"
                            />
                            <span class="pill psychic">Psychic</span>
                        </label>

                        <label class="pill-checkbox">
                            <input
                                type="checkbox"
                                class="type-check"
                                value="bug"
                            />
                            <span class="pill bug">Bug</span>
                        </label>

                        <label class="pill-checkbox">
                            <input
                                type="checkbox"
                                class="type-check"
                                value="rock"
                            />
                            <span class="pill rock">Rock</span>
                        </label>

                        <label class="pill-checkbox">
                            <input
                                type="checkbox"
                                class="type-check"
                                value="ghost"
                            />
                            <span class="pill ghost">Ghost</span>
                        </label>

                        <label class="pill-checkbox">
                            <input
                                type="checkbox"
                                class="type-check"
                                value="dragon"
                            />
                            <span class="pill dragon">Dragon</span>
                        </label>

                        <label class="pill-checkbox">
                            <input
                                type="checkbox"
                                class="type-check"
                                value="dark"
                            />
                            <span class="pill dark">Dark</span>
                        </label>

                        <label class="pill-checkbox">
                            <input
                                type="checkbox"
                                class="type-check"
                                value="steel"
                            />
                            <span class="pill steel">Steel</span>
                        </label>

                        <label class="pill-checkbox">
                            <input
                                type="checkbox"
                                class="type-check"
                                value="fairy"
                            />
                            <span class="pill fairy">Fairy</span>
                        </label>
                    </div>

                    <h3 class="filter-heading">Min HP</h3>
                    <input type="number" id="min-hp" placeholder="E.g. 50" />
                </aside>
                <section id="results-section" class="results-section">
                    <div id="results-container" class="results-container"></div>
                    <div id="page-controls" class="page-controls">
                        <button id="prev-btn" class="page-btn">
                            ⬅️ Previous
                        </button>
                        <p id="page-info" class="page-info">Page 1</p>
                        <button id="next-btn" class="page-btn">Next ➡️</button>
                    </div>
                </section>
            </div>
        </main>
        <script src="src/index.js"></script>
        <script src="src/loader.js"></script>
    </body>
</html>
